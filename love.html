<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Praise & Love</title>
  <style>
    body, html {
      margin: 0; padding: 0; height: 100%;
      font-family: 'Georgia', serif;
      background: linear-gradient(to top right, #ffe4e1, #ffb6c1, #ff69b4);
      display: flex; justify-content: center; align-items: center;
      text-align: center; color: #8b0000;
    }
    .container { max-width: 700px; padding: 30px; }
    h1 { font-size: 2.5em; margin-bottom: 20px; }
    p { font-size: 1.3em; margin-bottom: 20px; }
    .illustration { font-size: 3em; margin-bottom: 20px; }
    button {
      background-color: #ff69b4; border: none; padding: 12px 25px;
      font-size: 1.1em; color: white; border-radius: 25px; cursor: pointer;
    }
    button:hover { background-color: #ff1493; transform: scale(1.1); }
  </style>
</head>
<body>
  <div class="container">
    <div class="illustration">💘💞🌹✨</div>
    <h1>You are my everything</h1>
    <p>
      Your smile lights up my world.<br>
      Your kindness makes me better.<br>
      You are beautiful inside and out. 💖
    </p>
    <div class="illustration">❤️💕💐⭐</div>
    <button onclick="goToPage3()">Next</button>
  </div>
  <script>
    function goToPage3() {
      window.location.href = "final.html";
    }
  </script>
</body>
</html>
